<div class="animate-in">
  <div class="page-header">
    <div>
      <div class="page-title"><i class="bi bi-person-workspace me-2" style="color:var(--primary)"></i>Classes / Groupes</div>
      <div class="page-subtitle">{{ filtrees.length }} classe(s) active(s)</div>
    </div>
    <button class="btn-primary-custom">
      <i class="bi bi-plus-lg"></i> Nouvelle classe
    </button>
  </div>

  <div class="filters-bar">
    <div style="position:relative;flex:1;max-width:340px">
      <i class="bi bi-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
      <input type="text" class="form-control-custom" style="padding-left:38px"
             placeholder="Rechercher une classe..." [(ngModel)]="filtre" />
    </div>
  </div>

  <div class="card-premium">
    <div class="table-responsive">
      <table class="table-premium">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nom de la classe</th>
            <th>Effectif</th>
            <th>Délégué</th>
            <th>Département</th>
            <th style="text-align:center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (c of filtrees; track c.id) {
            <tr>
              <td><span style="color:var(--text-muted)">#{{ c.id }}</span></td>
              <td style="font-weight:600">{{ c.nom }}</td>
              <td>{{ c.effectif }} étudiants</td>
              <td>{{ c.delegue }}</td>
              <td><span class="badge-custom cours">{{ c.departement }}</span></td>
              <td style="text-align:center">
                <div class="d-flex gap-1 justify-content-center">
                  <button class="header-btn" title="Modifier"><i class="bi bi-pencil"></i></button>
                  <button class="header-btn" title="Supprimer" style="color:#dc2626"><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
