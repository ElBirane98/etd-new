<div class="animate-in">
  <div class="page-header">
    <div>
      <div class="page-title"><i class="bi bi-building me-2" style="color:var(--primary)"></i>Départements</div>
      <div class="page-subtitle">{{ filtrees.length }} département(s) enregistré(s)</div>
    </div>
    <button class="btn-primary-custom">
      <i class="bi bi-plus-lg"></i> Ajouter un département
    </button>
  </div>

  <div class="filters-bar">
    <div style="position:relative;flex:1;max-width:340px">
      <i class="bi bi-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
      <input type="text" class="form-control-custom" style="padding-left:38px"
             placeholder="Rechercher un département..." [(ngModel)]="filtre" />
    </div>
  </div>

  <div class="card-premium">
    <div class="table-responsive">
      <table class="table-premium">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nom du département</th>
            <th>Chef de département</th>
            <th>Nombre d'enseignants</th>
            <th style="text-align:center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (d of filtrees; track d.id) {
            <tr>
              <td><span style="color:var(--text-muted)">#{{ d.id }}</span></td>
              <td style="font-weight:600">{{ d.nom }}</td>
              <td>{{ d.chef }}</td>
              <td><span class="badge-custom cours">{{ d.effectif_enseignants }} enseignants</span></td>
              <td style="text-align:center">
                <div class="d-flex gap-1 justify-content-center">
                  <button class="header-btn" title="Modifier"><i class="bi bi-pencil"></i></button>
                  <button class="header-btn" title="Supprimer" style="color:#dc2626"><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
