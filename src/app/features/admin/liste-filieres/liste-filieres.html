<div class="animate-in">
  <div class="page-header">
    <div>
      <div class="page-title"><i class="bi bi-mortarboard me-2" style="color:var(--primary)"></i>Filières</div>
      <div class="page-subtitle">{{ filtrees.length }} filière(s) enregistrée(s)</div>
    </div>
    <button class="btn-primary-custom" (click)="ouvrirModal()">
      <i class="bi bi-plus-lg"></i> Nouvelle filière
    </button>
  </div>

  <div class="filters-bar">
    <div style="position:relative;flex:1;max-width:340px">
      <i class="bi bi-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
      <input type="text" class="form-control-custom" style="padding-left:38px"
             placeholder="Rechercher une filière..." [(ngModel)]="filtre" />
    </div>
  </div>

  <div class="card-premium">
    <div class="table-responsive">
      <table class="table-premium">
        <thead>
          <tr>
            <th>ID</th>
            <th>Acronyme</th>
            <th>Libellé complet</th>
            <th>Département</th>
            <th style="text-align:center">Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (f of filtrees; track f.id) {
            <tr>
              <td><span style="color:var(--text-muted)">#{{ f.id }}</span></td>
              <td style="font-weight:700;color:var(--primary)">{{ f.nom }}</td>
              <td style="font-weight:600">{{ f.libelle }}</td>
              <td><span class="badge-custom cours">{{ f.departement }}</span></td>
              <td style="text-align:center">
                <div class="d-flex gap-1 justify-content-center">
                  <button class="header-btn" title="Modifier" (click)="ouvrirModal(f)"><i class="bi bi-pencil"></i></button>
                  <button class="header-btn" title="Supprimer" style="color:#dc2626" (click)="supprimer(f.id)"><i class="bi bi-trash"></i></button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
@if (showModal) {
  <div class="modal-overlay" (click)="fermerModal()">
    <div class="modal-content-custom" (click)="$event.stopPropagation()">
      <div class="modal-header-custom">
        <h3>{{ isEditing ? 'Modifier la filière' : 'Nouvelle filière' }}</h3>
        <button class="close-btn" (click)="fermerModal()">&times;</button>
      </div>
      <div class="modal-body-custom">
        <div class="form-group-custom">
          <label>Acronyme (ex: GDIL)</label>
          <input type="text" class="form-control-custom" [(ngModel)]="currentFiliere.nom" placeholder="Entrez l'acronyme">
        </div>
        <div class="form-group-custom">
          <label>Libellé complet</label>
          <input type="text" class="form-control-custom" [(ngModel)]="currentFiliere.libelle" placeholder="Entrez le libellé complet">
        </div>
        <div class="form-group-custom">
          <label>Département</label>
          <select class="form-control-custom" [(ngModel)]="currentFiliere.departement_id">
            <option value="0" disabled>Sélectionnez un département</option>
            @for (d of departements; track d.id) {
              <option [value]="d.id">{{ d.nom }}</option>
            }
          </select>
        </div>
      </div>
      <div class="modal-footer-custom">
        <button class="btn-secondary-custom" (click)="fermerModal()">Annuler</button>
        <button class="btn-primary-custom" (click)="enregistrer()">
          {{ isEditing ? 'Mettre à jour' : 'Enregistrer' }}
        </button>
      </div>
    </div>
  </div>
}
