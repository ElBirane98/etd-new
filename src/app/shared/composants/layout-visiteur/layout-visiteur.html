<!-- Layout Visiteur -->
<div class="app-wrapper" style="flex-direction:column;min-height:100vh">

  <!-- Navbar visiteur -->
  <nav style="background:var(--sidebar-bg);height:var(--header-height);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:1030;box-shadow:var(--shadow-md)">

    <a routerLink="/visiteur/grille"
       style="display:flex;align-items:center;gap:12px;text-decoration:none">
      <div style="width:38px;height:38px;background:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,0.1)">
        <span style="font-family:'Inter', sans-serif; font-weight:900; font-size:1.4rem; background:linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">P</span>
      </div>
      <div>
        <div style="font-weight:700;font-size:.95rem;color:#fff;line-height:1.2">SamaPlan</div>
        <div style="font-size:.68rem;color:rgba(255,255,255,.55)">Emplois du temps</div>
      </div>
    </a>

    <div style="flex:1"></div>

    <span style="font-size:.78rem;color:rgba(255,255,255,.5);padding:4px 12px;border:1px solid rgba(255,255,255,.15);border-radius:20px">
      <i class="bi bi-eye me-1"></i> Mode visiteur
    </span>

    <a routerLink="/connexion"
       style="display:flex;align-items:center;gap:7px;padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;text-decoration:none;font-size:.825rem;font-weight:600;transition:all .2s"
       onmouseover="this.style.background='rgba(255,255,255,.2)'"
       onmouseout="this.style.background='rgba(255,255,255,.1)'">
      <i class="bi bi-box-arrow-in-right"></i> Connexion Admin
    </a>
  </nav>

  <!-- Contenu -->
  <main style="flex:1;padding:28px;background:var(--bg-main)">
    <router-outlet></router-outlet>
  </main>

  <footer class="page-footer">
    COPYRIGHT &copy; {{ annee }} — SamaPlan &middot; M1 GDIL UGB
  </footer>
</div>
